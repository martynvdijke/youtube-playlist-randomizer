name: Release

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      packages: write
      attestations: write
      id-token: write

  release:
    needs: ci
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      packages: write
      attestations: write
      id-token: write

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Build the Docker image
        if: steps.semantic.outputs.new_release_published == 'true'
        run: docker build . --file Dockerfile --tag martynvandijke/ypr:latest --tag ghcr.io/martynvdijke/ypr:latest
        
      - name: Push Docker image
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          VERSION=${{ steps.semantic.outputs.new_release_version }}
          docker tag martynvandijke/ypr:latest martynvandijke/ypr:$VERSION
          docker tag ghcr.io/martynvdijke/ypr:latest ghcr.io/martynvdijke/ypr:$VERSION
          
          docker push martynvandijke/ypr:latest
          docker push martynvandijke/ypr:$VERSION
          docker push ghcr.io/martynvdijke/ypr:latest
          docker push ghcr.io/martynvdijke/ypr:$VERSION

  notify:
    needs: [ci, release]
    if: ${{ !cancelled() }}
    name: Gotify Notification
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        if: needs.ci.result == 'success' && needs.release.result == 'success' && needs.release.outputs.new_release_published == 'true'
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: '${{ github.repository }} Release Published - ${{ needs.release.outputs.new_release_version }}'
          notification_message: '${{ github.repository }}: Version ${{ needs.release.outputs.new_release_version }} was successfully released.'

      - name: Failure Notification
        if: needs.ci.result == 'failure' || needs.release.result == 'failure'
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: 'Release Failed'
          notification_message: 'The release workflow has failed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          notification_priority: 5

