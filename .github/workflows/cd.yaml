name: CD

on:
  push:
    branches:
      - main

jobs:
  semantic-release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
      actions: read
      checks: write

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: pip install poetry
      - name: Configure Poetry to use the same Python version as setup-python
        run: poetry env use $(python -c "import sys; print(sys.executable)")
      - name: Install dependencies
        run: poetry install
      - name: Action For Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4.2.0
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish to pypi
        uses: JRubics/poetry-publish@v2.1
        with:
          pypi_token: ${{ secrets.PYPI_TOKEN }}

  notify:
    needs: [semantic-release]
    if: ${{ !cancelled() }}
    name: Gotify Notification
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        if: needs.semantic-release.result == 'success' && needs.semantic-release.outputs.new_release_published == 'true'
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: 'Release Published - ${{ needs.semantic-release.outputs.new_release_version }}'
          notification_message: 'Version ${{ needs.semantic-release.outputs.new_release_version }} was successfully released.'

      - name: Failure Notification
        if: needs.semantic-release.result == 'failure'
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: 'Release Failed'
          notification_message: 'The release workflow has failed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          notification_priority: 5
