<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist Randomizer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>YouTube Playlist Randomizer</h1>
  <div id="quota-bar" class="quota-bar">
    <div class="quota-label"><span id="quota-text">Quota: --</span></div>
    <div class="quota-track">
      <div id="quota-fill" class="quota-fill" style="width:0%"></div>
    </div>
  </div>
</header>

<main>
  <div id="loading">Loading playlists...</div>
  <div id="error" class="error hidden"></div>

  <div id="resume-banner" class="resume-banner hidden">
    <span id="resume-text"></span>
  </div>

  <div id="playlists" class="hidden">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Filter playlists..." oninput="filterPlaylists()">
    </div>
    <div id="playlist-list"></div>
  </div>

  <div id="no-playlists" class="hidden">
    <p>No playlists found.</p>
  </div>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2>Randomize Playlist</h2>
    <p id="modal-playlist-name"></p>
    <p id="modal-quota-cost" class="quota-cost"></p>
    <label for="new-name">Name for new randomized playlist:</label>
    <input type="text" id="new-name" placeholder="Enter playlist name">
    <div class="modal-actions">
      <button id="cancel-btn" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button id="submit-btn" class="btn btn-primary" onclick="startRandomize()">Randomize</button>
    </div>
  </div>
</div>

<div id="progress-modal" class="modal hidden">
  <div class="modal-content">
    <h2>Randomizing...</h2>
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <p id="progress-text">Starting...</p>
    <div id="progress-result" class="hidden">
      <p>Playlist created successfully!</p>
      <a id="playlist-link" href="#" target="_blank">Open in YouTube</a>
      <button class="btn btn-primary" onclick="closeProgressModal()">Done</button>
    </div>
    <div id="progress-paused" class="paused-banner hidden">
      <p>Quota exhausted. Progress saved.</p>
      <p class="paused-sub">The job will auto-resume when quota resets (next day) on server restart.</p>
      <button class="btn btn-primary" onclick="closeProgressModal()">OK</button>
    </div>
    <div id="progress-error" class="error hidden"></div>
  </div>
</div>

<script>
let playlists = [];
let selectedPlaylistId = null;
let selectedPlaylistCount = 0;
let pollInterval = null;
let quotaInfo = null;

const QuotaCostList = 1;
const QuotaCostCreate = 50;
const QuotaCostInsert = 50;

async function fetchQuota() {
  try {
    const res = await fetch('/api/quota');
    if (res.ok) {
      quotaInfo = await res.json();
      updateQuotaDisplay();
    }
  } catch (e) {}
}

function updateQuotaDisplay() {
  if (!quotaInfo) return;
  const pct = quotaInfo.limit > 0 ? Math.min((quotaInfo.used / quotaInfo.limit) * 100, 100) : 0;
  document.getElementById('quota-text').textContent = 'Quota: ' + quotaInfo.used + ' / ' + quotaInfo.limit + ' used (' + quotaInfo.remaining + ' remaining)';
  const fill = document.getElementById('quota-fill');
  fill.style.width = pct + '%';
  fill.className = 'quota-fill' + (pct > 80 ? ' quota-critical' : pct > 50 ? ' quota-warning' : '');
}

function estimateQuotaCost(itemCount) {
  if (!itemCount || itemCount === 0) return QuotaCostCreate;
  return QuotaCostCreate + itemCount * QuotaCostInsert;
}

async function fetchPlaylists() {
  try {
    const res = await fetch('/api/playlists');
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Failed to fetch playlists');
    }
    playlists = await res.json();
    document.getElementById('loading').classList.add('hidden');
    if (playlists.length === 0) {
      document.getElementById('no-playlists').classList.remove('hidden');
    } else {
      document.getElementById('playlists').classList.remove('hidden');
      renderPlaylists(playlists);
    }
  } catch (err) {
    document.getElementById('loading').classList.add('hidden');
    showError(err.message);
  }
}

function renderPlaylists(list) {
  const container = document.getElementById('playlist-list');
  container.innerHTML = '';
  if (list.length === 0) {
    container.innerHTML = '<p class="no-results">No playlists match your filter.</p>';
    return;
  }
  for (const pl of list) {
    const card = document.createElement('div');
    card.className = 'playlist-card';
    const cost = estimateQuotaCost(pl.ItemCount);
    card.innerHTML = `
      <div class="playlist-info">
        <span class="playlist-title">${escapeHtml(pl.Title)}</span>
        <span class="playlist-count">${pl.ItemCount || '?'} videos &middot; ~${cost} quota</span>
      </div>
      <button class="btn btn-randomize ${quotaInfo && quotaInfo.remaining < cost ? 'btn-disabled' : ''}"
        onclick="${quotaInfo && quotaInfo.remaining < cost ? '' : "openModal('" + pl.ID + "', '" + escapeHtml(pl.Title) + "', " + (pl.ItemCount || 0) + ")"}"
        ${quotaInfo && quotaInfo.remaining < cost ? 'disabled' : ''}>
        ${quotaInfo && quotaInfo.remaining < cost ? 'Insufficient Quota' : 'Randomize'}
      </button>
    `;
    container.appendChild(card);
  }
}

function filterPlaylists() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = playlists.filter(pl => pl.Title.toLowerCase().includes(q));
  renderPlaylists(filtered);
}

function openModal(id, title, itemCount) {
  selectedPlaylistId = id;
  selectedPlaylistCount = itemCount;
  document.getElementById('modal-playlist-name').textContent = title;
  const cost = estimateQuotaCost(itemCount);
  const costEl = document.getElementById('modal-quota-cost');
  if (quotaInfo) {
    costEl.textContent = 'Estimated quota cost: ' + cost + ' units (' + (quotaInfo.remaining >= cost ? 'Sufficient' : 'Insufficient') + ' remaining)';
    costEl.className = 'quota-cost ' + (quotaInfo.remaining >= cost ? 'quota-ok' : 'quota-low');
  }
  const now = new Date();
  const monthYear = now.toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('new-name').value = title + '-randomized-' + monthYear;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('new-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  selectedPlaylistId = null;
}

function closeProgressModal() {
  document.getElementById('progress-modal').classList.add('hidden');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-text').textContent = 'Starting...';
  document.getElementById('progress-result').classList.add('hidden');
  document.getElementById('progress-paused').classList.add('hidden');
  document.getElementById('progress-error').classList.add('hidden');
  if (pollInterval) {
    clearInterval(pollInterval);
    pollInterval = null;
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function startRandomize() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) {
    alert('Please enter a name for the new playlist.');
    return;
  }
  const id = selectedPlaylistId;
  closeModal();
  document.getElementById('progress-modal').classList.remove('hidden');
  document.getElementById('progress-text').textContent = 'Starting...';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-result').classList.add('hidden');
  document.getElementById('progress-paused').classList.add('hidden');
  document.getElementById('progress-error').classList.add('hidden');

  try {
    const res = await fetch('/api/randomize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playlistId: id, newName: name })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Failed to start randomization');
    }
    const job = await res.json();
    startPolling(job.jobId);
  } catch (err) {
    document.getElementById('progress-modal').classList.add('hidden');
    showError(err.message);
  }
}

function startPolling(jobId) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/jobs/' + jobId);
      if (!res.ok) {
        clearInterval(pollInterval);
        pollInterval = null;
        throw new Error('Failed to check job status');
      }
      const status = await res.json();
      updateProgress(status);
      fetchQuota();
    } catch (err) {
      clearInterval(pollInterval);
      pollInterval = null;
      document.getElementById('progress-text').textContent = 'Error checking status';
      document.getElementById('progress-error').textContent = err.message;
      document.getElementById('progress-error').classList.remove('hidden');
    }
  }, 1500);
}

function updateProgress(status) {
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');

  switch (status.status) {
    case 'pending':
      text.textContent = 'Waiting to start...';
      break;
    case 'fetching':
      text.textContent = 'Fetching playlist items...';
      fill.style.width = '25%';
      break;
    case 'shuffling':
      text.textContent = 'Shuffling items...';
      fill.style.width = '50%';
      break;
    case 'inserting':
      const pct = status.total > 0 ? Math.round((status.done / status.total) * 50) + 50 : 50;
      fill.style.width = Math.min(pct, 99) + '%';
      text.textContent = 'Inserting items... ' + status.done + ' / ' + status.total;
      break;
    case 'done':
      fill.style.width = '100%';
      document.getElementById('playlist-link').href = 'https://www.youtube.com/playlist?list=' + status.newPlaylistId;
      document.getElementById('progress-result').classList.remove('hidden');
      document.getElementById('progress-text').textContent = 'Playlist created successfully!';
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      break;
    case 'paused':
      fill.style.width = status.total > 0 ? Math.round((status.done / status.total) * 100) + '%' : '0%';
      text.textContent = 'Inserted ' + status.done + ' / ' + status.total + ' items';
      document.getElementById('progress-paused').classList.remove('hidden');
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      break;
    case 'error':
      fill.style.width = '100%';
      text.textContent = 'Error';
      document.getElementById('progress-error').textContent = status.error || 'An unknown error occurred';
      document.getElementById('progress-error').classList.remove('hidden');
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      break;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

fetchQuota();
fetchPlaylists();
</script>
</body>
</html>
