<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist Randomizer</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<!-- umami -->
<script defer src="/static/js/app.js"></script>
</head>
<body>
<header>
  <div class="header-top">
    <img src="/static/logo.svg" alt="Logo" class="logo">
    <div class="header-title-group">
      <h1>YouTube Playlist Randomizer</h1>
      <span class="version-badge" id="version-badge"></span>
    </div>
  </div>
  <div id="quota-bar" class="quota-bar" hx-get="/api/quota/html" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <div class="quota-label"><span>Quota: --</span></div>
    <div class="quota-track">
      <div class="quota-fill" style="width:0%"></div>
    </div>
  </div>
  <nav class="header-nav">
    <a href="#" class="nav-link active" id="nav-main" onclick="showMain()">Playlists</a>
    <a href="#" class="nav-link" id="nav-admin" onclick="showAdmin()">Admin</a>
  </nav>
</header>

<main>
  <div id="loading" class="loading-container htmx-indicator" hx-get="/api/playlists/html" hx-trigger="load delay:100ms" hx-target="#playlist-list" hx-swap="innerHTML" hx-on::before-request="document.getElementById('loading').classList.remove('hidden')" hx-on::after-request="document.getElementById('loading').classList.add('hidden')">
    <div class="spinner spinner-lg"></div>
    <span>Loading playlists...</span>
  </div>

  <!-- Skeleton loader shown during playlist requests -->
  <div id="playlist-skeleton" class="skeleton-container htmx-indicator">
    <div class="skeleton-card"><div class="skeleton-card-left"><div class="skeleton-checkbox skeleton"></div><div class="skeleton-text-group"><div class="skeleton-line skeleton" style="width:50%"></div><div class="skeleton-line-sm skeleton" style="width:30%"></div></div></div><div class="skeleton-btn skeleton" style="width:60px"></div></div>
    <div class="skeleton-card"><div class="skeleton-card-left"><div class="skeleton-checkbox skeleton"></div><div class="skeleton-text-group"><div class="skeleton-line skeleton" style="width:65%"></div><div class="skeleton-line-sm skeleton" style="width:25%"></div></div></div><div class="skeleton-btn skeleton" style="width:60px"></div></div>
    <div class="skeleton-card"><div class="skeleton-card-left"><div class="skeleton-checkbox skeleton"></div><div class="skeleton-text-group"><div class="skeleton-line skeleton" style="width:40%"></div><div class="skeleton-line-sm skeleton" style="width:35%"></div></div></div><div class="skeleton-btn skeleton" style="width:60px"></div></div>
    <div class="skeleton-card"><div class="skeleton-card-left"><div class="skeleton-checkbox skeleton"></div><div class="skeleton-text-group"><div class="skeleton-line skeleton" style="width:55%"></div><div class="skeleton-line-sm skeleton" style="width:20%"></div></div></div><div class="skeleton-btn skeleton" style="width:60px"></div></div>
  </div>

  <div id="error" class="error hidden"></div>

  <div id="job-queue" hx-get="/api/jobs/queue/html" hx-trigger="load, every 60s" hx-swap="innerHTML" hx-indicator=".spinner-jobq"></div>
  <div class="spinner spinner-lg spinner-jobq htmx-indicator" style="margin:16px auto;display:block"></div>

  <div id="playlists">
    <div class="toolbar">
      <div class="search-wrapper">
        <input type="text" id="search" name="q" placeholder='Filter playlists...  [press "/" to focus]' autocomplete="off"
               hx-get="/api/playlists/html" hx-trigger="keyup changed delay:300ms"
               hx-target="#playlist-list" hx-swap="innerHTML"
               hx-indicator="#playlist-skeleton">
        <span class="search-hint"><kbd>/</kbd></span>
      </div>
    </div>
    <div id="playlist-list" class="fade-in"></div>
  </div>

  <div id="no-playlists" class="hidden">
    <p>No playlists found.</p>
  </div>
</main>

<!-- Admin Panel -->
<div id="admin-panel">
  <div class="admin-tabs">
    <button class="admin-tab active" hx-get="/api/admin/logs/html" hx-target="#admin-content" hx-swap="innerHTML" hx-trigger="click">Logs</button>
    <button class="admin-tab" hx-get="/api/admin/settings/umami/html" hx-target="#admin-content" hx-swap="innerHTML" hx-trigger="click">Analytics</button>
    <button class="admin-tab" hx-get="/api/admin/settings/otel/html" hx-target="#admin-content" hx-swap="innerHTML" hx-trigger="click">Telemetry</button>
    <button class="admin-tab" hx-get="/api/admin/settings/gotify/html" hx-target="#admin-content" hx-swap="innerHTML" hx-trigger="click">Notifications</button>
  </div>
  <div id="admin-content" hx-get="/api/admin/logs/html" hx-trigger="load" hx-swap="innerHTML">
    Loading logs...
  </div>
</div>

<!-- Randomize Modal -->
<div id="modal" class="modal hidden"></div>

<!-- Progress Modal -->
<div id="progress-modal" class="modal hidden"></div>

<!-- Preview Modal -->
<div id="preview-modal" class="modal hidden"></div>

<!-- Undo result -->
<div id="undo-result" class="toast hidden"></div>

<script>
let selectedPlaylists = [];

function showMain() {
  document.getElementById('admin-panel').classList.remove('visible');
  document.getElementById('playlists').style.display = '';
  document.getElementById('job-queue').style.display = '';
  document.getElementById('loading').style.display = '';
  document.getElementById('no-playlists').style.display = '';
  document.getElementById('nav-main').classList.add('active');
  document.getElementById('nav-admin').classList.remove('active');
}
function showAdmin() {
  document.getElementById('admin-panel').classList.add('visible');
  document.getElementById('playlists').style.display = 'none';
  document.getElementById('job-queue').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('no-playlists').style.display = 'none';
  document.getElementById('nav-main').classList.remove('active');
  document.getElementById('nav-admin').classList.add('active');
}

// --- Smarter polling: pause HTMX polling when tab is hidden ---
(function() {
  let wasPolling = true;
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      // Pause HTMX polling by temporarily disabling all poll triggers
      document.querySelectorAll('[hx-trigger*="every"]').forEach(function(el) {
        el.setAttribute('data-poll-saved', el.getAttribute('hx-trigger'));
        el.setAttribute('hx-trigger', 'none');
      });
      wasPolling = true;
    } else if (wasPolling) {
      // Restore polling on return
      document.querySelectorAll('[data-poll-saved]').forEach(function(el) {
        el.setAttribute('hx-trigger', el.getAttribute('data-poll-saved'));
        el.removeAttribute('data-poll-saved');
      });
      // Trigger immediate refresh
      document.querySelectorAll('[hx-get="/api/jobs/queue/html"],[hx-get="/api/quota/html"]').forEach(function(el) {
        htmx.trigger(el, 'load');
      });
    }
  });
})();

// --- Keyboard shortcuts ---
document.addEventListener('keydown', function(e) {
  // Don't trigger shortcuts when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    if (e.key === 'Escape') {
      closeModal();
      closeProgressModal();
      closePreviewModal();
    }
    return;
  }

  switch (e.key) {
    case '/':
      e.preventDefault();
      const search = document.getElementById('search');
      if (search) search.focus();
      break;
    case 'Escape':
      closeModal();
      closeProgressModal();
      closePreviewModal();
      break;
    case 'r':
    case 'R':
      const btn = document.getElementById('randomize-selected');
      if (btn && !btn.classList.contains('hidden')) {
        randomizeSelected();
      }
      break;
  }
});

// Close modals on backdrop click
document.addEventListener('click', function(e) {
  if (e.target.id === 'modal' || e.target.id === 'progress-modal' || e.target.id === 'preview-modal') {
    const id = e.target.id;
    if (id === 'modal') closeModal();
    if (id === 'progress-modal') closeProgressModal();
    if (id === 'preview-modal') closePreviewModal();
  }
});

function updateSelected() {
  const checkboxes = document.querySelectorAll('.pl-checkbox:checked');
  selectedPlaylists = Array.from(checkboxes).map(cb => ({
    id: cb.dataset.id,
    title: cb.dataset.title
  }));
  const count = selectedPlaylists.length;
  const btn = document.getElementById('randomize-selected');
  const countSpan = document.getElementById('selected-count');
  if (count > 0) {
    btn.classList.remove('hidden');
    countSpan.textContent = count;
  } else {
    btn.classList.add('hidden');
  }
}

function randomizeSelected() {
  if (selectedPlaylists.length === 0) return;
  closeModal();
  // Build comma-separated IDs and titles
  const ids = selectedPlaylists.map(p => p.id);
  const title = selectedPlaylists.length === 1
    ? selectedPlaylists[0].title
    : selectedPlaylists[0].title + ' +' + (selectedPlaylists.length - 1) + ' more';

  // Load modal with multi-playlist support
  const params = new URLSearchParams({ id: ids[0], itemCount: '0', title: title });
  fetch('/api/modal/html?' + params.toString())
    .then(r => r.text())
    .then(html => {
      document.getElementById('modal').innerHTML = html;
      // Add hidden inputs for all playlist IDs
      const form = document.querySelector('#modal form');
      if (form) {
        ids.forEach(id => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = 'playlistId';
          input.value = id;
          form.appendChild(input);
        });
      }
      showModal();
    });
}

function showPreviewModal() {
  const modal = document.getElementById('preview-modal');
  if (modal) modal.classList.remove('hidden');
}
function closePreviewModal() {
  const modal = document.getElementById('preview-modal');
  if (modal) {
    modal.classList.add('hidden');
    modal.innerHTML = '';
  }
}
window.showPreviewModal = showPreviewModal;
window.closePreviewModal = closePreviewModal;
window.updateSelected = updateSelected;
window.randomizeSelected = randomizeSelected;
</script>
</body>
</html>
