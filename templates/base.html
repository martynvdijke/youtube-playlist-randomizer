<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Randomizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1><a href="/">YouTube Playlist Randomizer</a></h1>
        <div class="quota-bar">
            <div class="quota-fill" style="width:{{quotaPct}}%"></div>
            <span class="quota-text">{{used}} / {{limit}} quota used</span>
        </div>
        <nav>
            <a href="/">Playlists</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>
    <main>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
